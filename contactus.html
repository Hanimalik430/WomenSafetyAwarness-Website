*

        }    
     nav
     {

        padding:8px;

        justify-content: space-around;
        flex-wrap: nowrap;
        margin: 5px;

     }

        color: black;
        font-size: 20px;
        text-decoration: none;
        flex-shrink:1;
     }
    a:hover
     {
        color: purple;
     }
     .hero
     {
        height: 200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding:5px;
        margin: 10px 10px 3px 10px;
     }
     .main
     {
       color: rgb(120, 1, 41);;
       opacity: 0.5px;
       padding: 5px;
       font-size: 60px;
     }
     @media (max-width: 480px)
     {.main{
        font-size: 40px;
     }}

     {
       color: black;
       opacity: 0.5px;
       padding: 5px;

     }

    .c1
    {
     display: flex;

    }
    .form
    {
        height: 350px;
        width: 350px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-content: center;
        padding: 5px;
        margin: 10px;
        text-decoration: none;
        border: 3px solid rgb(120, 1, 41);;
        border-radius: 8px;
        box-shadow: 8px 8px 5px gray;
        transition: 3s;
    }
    .form:hover
    {
        transform: scale(1.05);
        background-color:rgb(209, 118, 108);
    
    }
    .form label
    {
        text-decoration: none;
        padding: 5px;
        font-size: 25px;
        color:black;
        font-weight: bold;
        text-align: center;
    }
    .form label:hover
    {
        color: white;
    }
    
    .form input
    {
        text-decoration: none;
        padding: 5px;
        color:rgb(138, 22, 60);
        height: 20px;
        margin: 2px 7px 3px ;
        border: 2px solid rgb(137, 4, 49);
        border-radius: 5px;
   }
   .form textarea
    {
        text-decoration: none;
        padding: 5px;
        color:rgb(138, 22, 60);
        height: 40px;
        margin: 2px 7px 3px ;
        border: 2px solid rgb(137, 4, 49);
        border-radius: 5px;
     }
     .form button
    {
        text-decoration: none;
        border: 0px;
        background-color: rgb(137, 4, 49);
        border-radius: 20px;
        padding: 8px;
        margin: 2px 7px 3px ;
        color:white;
        font-size: 17px;
        box-shadow: 0px 0px 13px gray;
        font-weight: bold;

    }
    .form button:hover
    {
          background-color: burlywood;
        color: black;
        transform: scale(1.05);
       
    }
    @keyframes bounce
    {
        0%
    {
        transform: scale(1);
    }

    25%
    {
        transform: scale(1.05);
    }

    50%
    {
        transform: scale(1);
    }

    75%
    {
        transform: scale(1.08);
    }

    100%
    {
        transform: scale(1);
    }
    }
    .c1{
        display: flex;
        align-content: center;
    }
    .info
    {
        display: flex;
        flex-direction:column;
        padding:5px;
        margin:8px;
        gap: 10px;
        width: 400px;
        animation-name: bounce ;
        animation-timing-function: 5px;
        animation-duration: 4s;
        animation-iteration-count: infinite; 
        
    } 
    .item
    {
        display: flex;
        flex-direction: row;
        padding: 5px;
        border-radius: 5px;
        border: 2px solid rgb(137, 4, 49);
        box-shadow: 5px 5px 3px gray ;
        gap: 5px;
    }
    h3{
    font-size: 30px;
    color: rgb(120, 1, 41);
    }
    h4
    {
        font-size: 20px;
        color :black;
    }
    p
    {
        font-size:20px ;
        color:black;
    }
    
    .social-icons{
      margin-top:25px;
      display: flex;
      justify-content: center;
      flex-direction:row;
      
    }

     .social-icons a{
      text-decoration:none;
      margin:0 10px;
      font-size:26px;
      color:rgb(120, 1, 41);;
      transition:0.3s;
      box-shadow: 0px 0px 5px lightgray;
      
      
    }

     .social-icons a:hover{
      color:#c2185b;
      transform:scale(1.2);
    }

     footer
     {
        padding: 4px;
        align-content: center;
        background-color:palevioletred;
        margin: 10px;
        text-align: center;
        font-weight: bold;
     }
     .c2
     {
        color:black;
     }
